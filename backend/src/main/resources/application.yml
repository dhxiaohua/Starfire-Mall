server:
  port: 8080

spring:
  application:
    name: starfire-mall

  # HTTP 编码配置
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/starfire_mall?useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_database_password_here  # 请修改为你的数据库密码
    hikari:
      auto-commit: true
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      validation-timeout: 5000
      initialization-fail-timeout: -1

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  redis:
    host: localhost
    port: 6379
    password:  # Redis 密码（如果有）
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传配置
file:
  upload:
    path: Starfire-Mall/frontend/public/images/avatars  # 请修改为你的实际路径

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT配置
jwt:
  secret: your_jwt_secret_key_must_be_at_least_256_bits_long  # 请修改为你的JWT密钥（至少256位）
  expiration: 86400000  # 24小时

# 验证码配置
captcha:
  expiration: 300000  # 5分钟

# 管理后台账号
admin:
  username: admin
  password: admin123  # 请修改为你的管理员密码

# AnythingLLM 配置（AI客服功能，可选）
anythingllm:
  # AnythingLLM API 地址（必须与 AnythingLLM 服务运行地址一致）
  api-url: http://127.0.0.1:3001
  # AnythingLLM API Key（从 AnythingLLM 设置中获取）
  api-key: your_anythingllm_api_key_here  # 请修改为你的API密钥
  # 工作区 ID（UUID 格式，从 AnythingLLM 工作区设置中获取）
  workspace: your_workspace_uuid_here  # 请修改为你的工作区ID
